<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería | TW Racing</title>

    <link rel="icon" href="img/Proyecto nuevo.jpg" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-3"
    >
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="index.html"
        >
          <img
            src="img/logoconBandera.png"
            alt="Logo TW Racing"
            width="40"
            height="40"
            class="rounded-circle object-fit-cover bg-light"
          />
          <span class="fs-4">TW <span class="text-racing">RACING</span></span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav gap-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="plantilla.html">Plantilla</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="partidos.html">Partidos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="py-5 text-center mt-4">
      <div class="container">
        <h1 class="gallery-title display-4 fw-bold mb-3 text-white">
          GALERÍA DEL <span class="text-racing">CLUB</span>
        </h1>
        <p class="text-light opacity-75 fs-5 mb-0">
          Los mejores goles, celebraciones y victorias en FC26.
        </p>
      </div>
    </header>

    <main class="container mb-5">
      <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/aura.PNG"
              alt="Once Inicial"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Once+Inicial'
              "
            />
          </div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/queja.PNG"
              alt="Once Inicial"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Once+Inicial'
              "
            />
          </div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/descanso.PNG"
              alt="Once Inicial"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Once+Inicial'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/cabezazoMorgu.jpg"
              alt="Victoria Racing"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Captura+FC26'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/equipo.jpg"
              alt="Celebración"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Celebración+Equipo'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/hattrick.png"
              alt="Gol del Capitán"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Gol+del+Capitán'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/x.png"
              alt="Trofeo"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Final+Regions+Cup'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/Sin título.png"
              alt="Entrenamiento"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Entrenamiento'
              "
            />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="gallery-item shadow">
            <img
              src="img/dfasfa.png"
              alt="Once Inicial"
              onerror="
                this.src =
                  'https://via.placeholder.com/500x300/1a1e1b/00d26a?text=Once+Inicial'
              "

    <footer
      class="text-center py-5 mt-5 border-top border-secondary"

    >
      <div class="container text-muted">
        <div class="d-flex justify-content-center gap-4 mb-4">
          <a href="https://twitter.com/TwRacingCP" class="text-muted fs-4"
            ><i class="fab fa-x-twitter"></i
          ></a>
          <a href="https://twitch.tv/twcantabria" class="text-muted fs-4"
            ><i class="fab fa-twitch"></i
          ></a>
          <a href="https://www.youtube.com/@TWCantabria" class="text-muted fs-4"
            ><i class="fab fa-youtube"></i
          ></a>
        </div>
        <p class="mb-0">&copy; 2026 TW Racing eSports.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
